services:
  cpp-course:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpp-curso
    # Monta el directorio actual en /workspace dentro del contenedor
    volumes:
      - .:/workspace
      # Volumen para persistir histórico de bash (directorio, no archivo)
      - bash-history:/commandhistory
    # Permite interacción con la terminal
    stdin_open: true
    tty: true
    # Nombre del host dentro del contenedor
    hostname: cpp-dev
    # Ambiente de desarrollo
    environment:
      - TERM=xterm-256color
      # C.UTF-8 existe en debian-slim sin generar locales (evita warnings)
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      # Guarda el historial de bash en el volumen persistente
      - HISTFILE=/commandhistory/.bash_history
    # Permite acceso a recursos del sistema (debugger, etc)
    cap_add:
      - SYS_PTRACE

volumes:
  bash-history:
    driver: local
